name: Deploy Worker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: production-worker
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-worker
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Prepare production bindings
        run: node scripts/prepare-production-worker-config.mjs
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CROSSFLOW_APP_ORIGIN: ${{ vars.CROSSFLOW_APP_ORIGIN }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply crossflow-auth --remote --config .wrangler.production.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        id: worker-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config .wrangler.production.jsonc

      - name: Verify deployed Worker
        run: curl --fail --location --retry 5 --retry-delay 5 "${{ steps.worker-deploy.outputs.deployment-url }}/activity"
