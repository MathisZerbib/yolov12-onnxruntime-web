name: Deploy frontend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit to deploy
        required: false
        default: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production-frontend
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate release configuration
        run: node scripts/validate-frontend-release-env.mjs
        env:
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_AUTH_API_URL: ${{ vars.VITE_AUTH_API_URL }}
          VITE_MARKET_CONTRACT_ADDRESS: ${{ vars.VITE_MARKET_CONTRACT_ADDRESS }}

      - name: Build production frontend
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_AUTH_API_URL: ${{ vars.VITE_AUTH_API_URL }}
          VITE_MARKET_CONTRACT_ADDRESS: ${{ vars.VITE_MARKET_CONTRACT_ADDRESS }}

      - uses: actions/configure-pages@v5
        with:
          static_site_generator: vite

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed frontend
        run: curl --fail --location --retry 5 --retry-delay 5 "${{ steps.deployment.outputs.page_url }}"
